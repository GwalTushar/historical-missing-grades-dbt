          project: shopstream_dbt_demo
          layer: silver
      connect_retries: 3
      connect_timeout: 30
      session_start_timeout: 1800
      poll_wait: 30
      retry_all: true

    gold_warehouse:
      type: fabric
      driver: "ODBC Driver 18 for SQL Server"
      server: "j5rarvnxudju7firawyyzibhqq-pv7jaxqz6s7ulf7j23mgw7kbom.datawarehouse.fabric.microsoft.com"
      port: 1433
      database: wh_gold
